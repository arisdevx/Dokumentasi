services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCS_TITLE: "${DOCS_TITLE:-API Documentation}"
        DOCS_DESCRIPTION: "${DOCS_DESCRIPTION:-Official API documentation}"
        DOCS_VERSION: "${DOCS_VERSION:-v1}"
        DOCS_BASE_PATH: "${DOCS_BASE_PATH:-/}"
        DOCS_LOGO: "${DOCS_LOGO:-/assets/logo.svg}"
        DOCS_LOGO_DARK: "${DOCS_LOGO_DARK:-/assets/logo-dark.svg}"
        DOCS_LOGO_ALT: "${DOCS_LOGO_ALT:-API Documentation}"
        DOCS_API_DEV_URL: "${DOCS_API_DEV_URL:-https://dev-api.example.com}"
        DOCS_API_STAGING_URL: "${DOCS_API_STAGING_URL:-https://staging-api.example.com}"
        DOCS_API_PROD_URL: "${DOCS_API_PROD_URL:-https://api.example.com}"
        DOCS_DEFAULT_ENV: "${DOCS_DEFAULT_ENV:-production}"
        DOCS_ENABLE_TRY_IT: "${DOCS_ENABLE_TRY_IT:-true}"
        DOCS_TRY_IT_ALLOW_CUSTOM_BASE_URL: "${DOCS_TRY_IT_ALLOW_CUSTOM_BASE_URL:-false}"
        DOCS_TRY_IT_PROXY_URL: "${DOCS_TRY_IT_PROXY_URL:-}"
        DOCS_VISIBILITY: "${DOCS_VISIBILITY:-public}"
    ports:
      - "${DOCS_PORT:-8080}:80"
    restart: unless-stopped

  docs-dev:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${DOCS_DEV_PORT:-5173}:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  node_modules:
