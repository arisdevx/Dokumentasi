server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|json|txt|yaml)$ {
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public";
  }
}
