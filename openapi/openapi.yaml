openapi: 3.1.0
info:
  title: Dokumentasi Example API
  version: 1.0.0
  description: Example API contract used by the Dokumentasi starter.
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
  - url: https://dev-api.example.com
    description: Development
tags:
  - name: Users
    description: User profile and account endpoints.
paths:
  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get Current User
      description: Retrieve the profile of the currently authenticated user.
      tags:
        - Users
      x-visibility: public
      x-ai:
        usage: Use this endpoint to hydrate authenticated frontend user state.
        frontendFlow: Call after login, token refresh, or application bootstrap.
        commonMistakes:
          - Do not call this endpoint without an Authorization header.
          - Do not poll this endpoint on every render.
      security:
        - bearerAuth: []
      parameters:
        - name: fields
          in: query
          required: false
          description: Comma-separated list of user fields to include.
          schema:
            type: string
          example: id,name,email
        - name: X-Request-ID
          in: header
          required: false
          description: Optional request id for tracing.
          schema:
            type: string
          example: req_123456
      responses:
        "200":
          description: The authenticated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: usr_123456
                name: Jane Doe
                email: jane@example.com
                role: user
                timezone: UTC
                created_at: "2024-01-15T10:30:00Z"
                updated_at: "2024-05-20T14:15:00Z"
        "401":
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: UNAUTHORIZED
                message: Missing or invalid access token
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: RATE_LIMITED
                message: Too many requests
  /users:
    get:
      operationId: listUsers
      summary: List Users
      description: Return a paginated list of users.
      tags:
        - Users
      x-visibility: public
      x-ai:
        usage: Use this endpoint in admin interfaces that need to browse users.
        frontendFlow: Call from paginated user management screens.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number to retrieve.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: per_page
          in: query
          required: false
          description: Number of users per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        "200":
          description: Paginated users.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                data:
                  - id: usr_123456
                    name: Jane Doe
                    email: jane@example.com
                    role: user
                    timezone: UTC
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-05-20T14:15:00Z"
                meta:
                  page: 1
                  per_page: 20
                  total: 1
        "401":
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
        - role
      properties:
        id:
          type: string
          example: usr_123456
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        role:
          type: string
          enum:
            - user
            - admin
          example: user
        timezone:
          type: string
          example: UTC
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-05-20T14:15:00Z"
    PaginationMeta:
      type: object
      required:
        - page
        - per_page
        - total
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Missing or invalid access token
        errors:
          type: object
          additionalProperties: true
