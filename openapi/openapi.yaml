openapi: 3.1.0
info:
  title: API Documentation
  version: 0.1.0
  description: Example API contract for the documentation platform.
servers:
  - url: https://api.example.com
    description: Production
paths:
  /sample-items:
    get:
      operationId: listSampleItems
      summary: List sample items
      description: Retrieve a paginated list of sample items visible to the authenticated client.
      tags:
        - Sample Items
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number to retrieve.
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of items to return per page.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Sample items were returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleItemListResponse"
              example:
                data:
                  - id: "item_123"
                    name: "Starter item"
                    status: "active"
                    created_at: "2026-07-18T03:30:00Z"
                    updated_at: "2026-07-18T03:30:00Z"
                pagination:
                  page: 1
                  per_page: 20
                  total: 1
        "401":
          description: Authentication failed or the access token is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "unauthorized"
                  message: "Provide a valid access token."
      x-visibility: public
      x-ai:
        usage: "Use this endpoint to render a list or picker of sample items."
        frontendFlow: "Call after the user is authenticated and refresh the list after create, update, or delete actions."
        commonMistakes:
          - "Do not request more than 100 items per page."
          - "Do not call this endpoint without an Authorization header."
    post:
      operationId: createSampleItem
      summary: Create a sample item
      description: Create a new sample item with a unique name and initial status.
      tags:
        - Sample Items
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSampleItemRequest"
            example:
              name: "Starter item"
              status: "active"
      responses:
        "201":
          description: Sample item was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleItemResponse"
              example:
                data:
                  id: "item_123"
                  name: "Starter item"
                  status: "active"
                  created_at: "2026-07-18T03:30:00Z"
                  updated_at: "2026-07-18T03:30:00Z"
        "400":
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "validation_error"
                  message: "The request contains invalid fields."
                  fields:
                    name:
                      - "Name is required."
        "401":
          description: Authentication failed or the access token is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "unauthorized"
                  message: "Provide a valid access token."
      x-visibility: public
      x-ai:
        usage: "Use this endpoint when the user submits a form to create a sample item."
        frontendFlow: "Validate required fields before sending the request, then refresh the list after a successful response."
        commonMistakes:
          - "Do not send empty names."
          - "Do not assume the created item id before reading the response."
  /sample-items/{itemId}:
    patch:
      operationId: updateSampleItem
      summary: Update a sample item
      description: Update editable fields on an existing sample item.
      tags:
        - Sample Items
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSampleItemRequest"
            example:
              name: "Renamed item"
              status: "archived"
      responses:
        "200":
          description: Sample item was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleItemResponse"
              example:
                data:
                  id: "item_123"
                  name: "Renamed item"
                  status: "archived"
                  created_at: "2026-07-18T03:30:00Z"
                  updated_at: "2026-07-18T04:15:00Z"
        "400":
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "validation_error"
                  message: "The request contains invalid fields."
                  fields:
                    name:
                      - "Name is required."
        "401":
          description: Authentication failed or the access token is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "unauthorized"
                  message: "Provide a valid access token."
        "404":
          description: The requested sample item was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "not_found"
                  message: "Sample item was not found."
      x-visibility: public
      x-ai:
        usage: "Use this endpoint to persist edits from an item detail form."
        frontendFlow: "Send only fields that changed, then replace the cached item with the response body."
        commonMistakes:
          - "Do not use PATCH to create a new item."
          - "Do not omit the itemId path parameter."
    delete:
      operationId: deleteSampleItem
      summary: Delete a sample item
      description: Delete an existing sample item by id.
      tags:
        - Sample Items
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: Sample item was deleted. The response body is empty.
        "401":
          description: Authentication failed or the access token is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "unauthorized"
                  message: "Provide a valid access token."
        "404":
          description: The requested sample item was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: "not_found"
                  message: "Sample item was not found."
      x-visibility: public
      x-ai:
        usage: "Use this endpoint when the user confirms deletion of a sample item."
        frontendFlow: "Remove the item from local UI state after the 204 response."
        commonMistakes:
          - "Do not expect a JSON response body for a successful delete."
          - "Do not retry deletion without checking whether the item still exists."
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ItemId:
      name: itemId
      in: path
      description: Unique sample item identifier.
      required: true
      schema:
        type: string
        pattern: "^item_[A-Za-z0-9]+$"
      example: "item_123"
  schemas:
    SampleItem:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: "item_123"
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: "Starter item"
        status:
          type: string
          enum:
            - active
            - archived
          example: "active"
        created_at:
          type: string
          format: date-time
          example: "2026-07-18T03:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-18T03:30:00Z"
    SampleItemResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/SampleItem"
    SampleItemListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SampleItem"
        pagination:
          type: object
          required:
            - page
            - per_page
            - total
          properties:
            page:
              type: integer
              minimum: 1
            per_page:
              type: integer
              minimum: 1
            total:
              type: integer
              minimum: 0
    CreateSampleItemRequest:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        status:
          type: string
          enum:
            - active
            - archived
    UpdateSampleItemRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        status:
          type: string
          enum:
            - active
            - archived
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
  responses:
    Unauthorized:
      description: Authentication failed or the access token is missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "unauthorized"
              message: "Provide a valid access token."
    ValidationError:
      description: Request body or query parameters failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "validation_error"
              message: "The request contains invalid fields."
              fields:
                name:
                  - "Name is required."
    NotFound:
      description: The requested sample item was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "not_found"
              message: "Sample item was not found."
